server.port=8111
spring.datasource.url=jdbc:postgresql://localhost:5432/ayushman?currentSchema=billerdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.mode=always
spring.main.allow-bean-definition-overriding=true

#BBCU Config
cu.domain=http://localhost:8112
cu.billfetchrequest.url=/bbps/BillFetchRequest/1.0/urn:referenceId:
cu.billpaymentrequest.url=/bbps/BillPaymentRequest/1.0/urn:referenceId:
cu.billfetchresponse.url=/bbps/BillFetchResponse/1.0/urn:referenceId:
cu.billpaymentresponse.url=/bbps/BillPaymentResponse/1.0/urn:referenceId:

# BBPS callback endpoint config (used by fetch/payment services)
bbps.ip=${cu.domain}
bbps.billfetchresponse.url=${cu.billfetchresponse.url}
bbps.billpaymentresponse.url=${cu.billpaymentresponse.url}
hbt.frequency=3
ou.id=BBPS001